appId: pl.ksef.monitor
productName: KSeF Monitor
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - resources/**/*
  - "!node_modules/**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: ksefmonitor
  repo: ksefmonitor
