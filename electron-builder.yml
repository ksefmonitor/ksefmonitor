afterPack: ./afterPack.cjs
appId: pl.ksef.monitor
productName: KSeF Monitor
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - "!node_modules/**/*"
  - node_modules/sql.js/**/*
  - node_modules/xml-crypto/**/*
  - node_modules/xpath/**/*
  - "node_modules/@xmldom/**/*"
extraResources:
  - from: resources
    to: resources
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: icon.ico
  artifactName: ${productName}-${version}-Setup.${ext}
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: true
publish:
  provider: github
  owner: ksefmonitor
  repo: ksefmonitor
